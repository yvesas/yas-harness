name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: workflows only need to read the code.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format
        run: npm run format:check

      - name: License headers
        run: npm run license:check

      - name: Architecture boundaries
        run: npm run boundaries

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  database:
    name: Migrations and integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: harness
          POSTGRES_PASSWORD: harness
          POSTGRES_DB: harness
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U harness -d harness"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://harness:harness@localhost:5432/harness
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # A migration that cannot be rolled back is a migration we cannot ship.
      - name: Apply
        run: node scripts/migrate.mjs up

      - name: Roll back
        run: node scripts/migrate.mjs down

      - name: Re-apply
        run: node scripts/migrate.mjs up

      # Tenant isolation is a schema guarantee, so it is proven against the
      # schema. These tests skip when DATABASE_URL is unset.
      - name: Integration tests
        run: npm test

  commits:
    name: Commit messages
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # The commit-msg hook can be bypassed locally; this cannot.
      - name: Validate commit messages
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          status=0
          for sha in $(git rev-list "$base".."$head"); do
            # Bot commits are generated, not authored: Dependabot's subject
            # names every package it bumped and routinely exceeds our length
            # rule, which it has no way to satisfy. What lands on main is the
            # squash title, and a maintainer writes that.
            author=$(git log -1 --format=%an "$sha")
            case "$author" in
              'dependabot[bot]' | 'github-actions[bot]') continue ;;
            esac

            git log -1 --format=%B "$sha" > /tmp/commit-msg
            if ! .githooks/commit-msg /tmp/commit-msg; then
              echo "::error::invalid commit message in $sha"
              status=1
            fi
          done
          exit $status
